sonar.projectKey=benpate_sniff
sonar.organization=benpate

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=sniff

# Go test coverage report, produced by the SonarCloud workflow.
sonar.go.coverage.reportPaths=coverage.out

# Exclude generated and test files from duplication/coverage metrics.
sonar.test.inclusions=**/*_test.go
